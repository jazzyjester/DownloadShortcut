name: DownloadShortcut
options:
  bundleIdPrefix: dev.jazzyjester
  deploymentTarget:
    macOS: "14.0"

packages:
  DownloadShortcutPackage:
    path: .

targets:
  DownloadShortcut:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - Info.plist
          - DownloadShortcut.entitlements
    dependencies:
      # Just the "AppFeature" product: it transitively brings in every other target
      # this app needs (QuickAddFeature, StatusBarFeature, SettingsFeature, etc.).
      - package: DownloadShortcutPackage
        product: AppFeature
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jazzyjester.DownloadShortcut
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: App/DownloadShortcut.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        # Not App Sandbox (no App Sandbox entitlement key set) — see the comment in
        # App/DownloadShortcut.entitlements for why.

schemes:
  DownloadShortcut:
    build:
      targets:
        DownloadShortcut: all
    run:
      config: Debug
